name: Build and Push UserMint API

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  REGION: us-central1
  REPO: usermint
  IMAGE: api

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: usermint-network
          service_account_email: ${{ secrets.GCP_SA_EMAIL }}
          service_account_key: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker auth for Artifact Registry
        run: |
          gcloud auth configure-docker $REGION-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          TAG=$(date +%s)
          echo "TAG=$TAG" >> $GITHUB_ENV
          docker build \
            -f api/Dockerfile \
            -t $REGION-docker.pkg.dev/usermint-network/$REPO/$IMAGE:$TAG \
            ./api

      - name: Push Docker image
        run: |
          docker push $REGION-docker.pkg.dev/usermint-network/$REPO/$IMAGE:$TAG

      - name: Save image tag artifact (optional)
        run: echo $TAG > image-tag.txt

